          senior: { title: "절대적 위기! 따뜻한 관심이 필요합니다", rx: ["규칙적인 식사·복약을 혼자 챙기기 어렵다면, 가족이나 복지사에게 도움을 요청해 함께 관리하기", "혼자만의 시간보다 경로당·노인복지관·종교모임 등에 참여해 매일 한 사람 이상 얼굴 보며 말 나누기", "무기력하고 삶이 공허하게 느껴진다면, 주저하지 말고 109 또는 129에 즉시 전화하고, 가까운 정신건강복지센터를 방문해 전문가와 대화하기"] }
        }
      };

      const base = {
        very_low: { emoji: "💎", color: "text-apple-blue", style: "border-apple-blue/40 bg-apple-blue/10 text-apple-blue", badge: "최상 안정", desc: "마치 거울 같은 평온한 마음 상태입니다. 이 에너지를 원동력으로 더 큰 꿈을 향해 나아가보세요." },
        low: { emoji: "🧘", color: "text-apple-green", style: "border-apple-green/40 bg-apple-green/10 text-apple-green", badge: "안정 단계", desc: "현재 활력이 넘치고 안정적인 상태입니다. 이 에너지를 나뿐만 아니라 주변인들에게도 나누어 보세요." },
        moderate: { emoji: "🌤️", color: "text-apple-orange", style: "border-apple-orange/40 bg-apple-orange/10 text-apple-orange", badge: "주의 단계", desc: "마음의 경고등에 불이 들어왔습니다. 더 큰 소진이 오기 전에 나만의 휴식 공간으로 들어가 보세요." },
        high: { emoji: "🆘", color: "text-apple-red", style: "border-apple-red/40 bg-apple-red/10 text-apple-red", badge: "위험 단계", desc: "폭풍우 속에 서 있는 듯한 위태로운 상태입니다. 당신의 짐을 함께 들어줄 전문가의 손길이 꼭 필요합니다." },
        high_danger: { emoji: "🚨", color: "text-apple-red", style: "border-apple-red/40 bg-apple-red/20 text-apple-red pulse-red", badge: "고위험군", desc: "극심한 스트레스 상황에 노출되어 있습니다. 지금은 자책보다 전문적인 개입이 가장 시급한 때입니다." }
      };

      return { ...base[level], ...db[level][age] };
    };

    const App = () => {
      const [view, setView] = useState('start'); // start, age, quiz, result, admin
      const [age, setAge] = useState(null);
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});
      const [result, setResult] = useState(null);
      const [contact, setContact] = useState('');
      const [contactName, setContactName] = useState('');
      const [contactAge, setContactAge] = useState('');
      const [contactSubmitted, setContactSubmitted] = useState(false);
      const [consent, setConsent] = useState(false);
      const adminClicks = useRef(0);

      const answered = Object.keys(answers).length;
      const total = questions.length;
      const isLast = step === total - 1;

      const saveStats = (level, ageGroup) => {
        const stats = JSON.parse(localStorage.getItem('stress_stats') || '{"total":0, "levels":{}, "ages":{}, "daily":{}, "contacts":[]}');
        const today = new Date().toISOString().split('T')[0];

        stats.total++;
        stats.levels[level] = (stats.levels[level] || 0) + 1;
        stats.ages[ageGroup] = (stats.ages[ageGroup] || 0) + 1;
        stats.daily[today] = (stats.daily[today] || 0) + 1;
        localStorage.setItem('stress_stats', JSON.stringify(stats));
      };

      const handleContactSubmit = () => {
        if (!consent) return alert('개인정보 수집 및 이용에 동의해주세요.');
        if (!contactName || !contactAge) return alert('성함과 나이를 모두 입력해주세요.');
        if (!contact || contact.length < 10) return alert('정확한 연락처를 입력해주세요.');
        const stats = JSON.parse(localStorage.getItem('stress_stats') || '{"total":0, "levels":{}, "ages":{}, "daily":{}, "contacts":[]}');
        const today = new Date().toISOString().split('T')[0];
        stats.contacts = stats.contacts || [];
        stats.contacts.push({
          date: today, name: contactName, ageInForm: contactAge, phone: contact,
          level: result.level, ageGroup: ageGroups.find(g => g.id === age).label, score: result.score
        });
        localStorage.setItem('stress_stats', JSON.stringify(stats));
        setContactSubmitted(true);
      };

      const resetAdminStats = () => {
        if (confirm('모든 누적 통계 데이터 및 연락처 기록을 영구적으로 삭제하시겠습니까?')) {
          localStorage.setItem('stress_stats', '{"total":0, "levels":{}, "ages":{}, "daily":{}, "contacts":[]}');
          setView('start');
          alert('초기화 되었습니다.');
        }
      };

      const handlePick = (qId, val) => {
        setAnswers(p => ({ ...p, [qId]: val }));
        if (!isLast) {
          setTimeout(() => setStep(p => p + 1), 350);
        }
      };

      const calculate = () => {
        // 모든 문항이 답변되었는지 확인
        const missingIdx = questions.findIndex(q => answers[q.id] === undefined);
        if (missingIdx !== -1) {
          alert('아직 답변하지 않은 문항이 있습니다. 해당 문항으로 이동합니다.');
          setStep(missingIdx);
          return;
        }

        let rawScore = 0;
        questions.forEach(q => {
          rawScore += (answers[q.id] || 0);
        });

        // K-DASS-21은 원시 점수 x 2 로 최종 스트레스 점수 판별
        const score = rawScore * 2;

        let level;
        if (score <= 14) level = 'very_low';
        else if (score <= 18) level = 'low';
        else if (score <= 25) level = 'moderate';
        else if (score <= 33) level = 'high';
        else level = 'high_danger';

        saveStats(level, age);
        setResult({ score, level });
        setView('result');
      };

      const reset = () => {
        setAnswers({}); setResult(null); setStep(0); setAge(null);
        setContact(''); setContactName(''); setContactAge('');
        setContactSubmitted(false); setConsent(false); setView('start');
      };

      const handleAdminAccess = () => {
        adminClicks.current += 1;
        if (adminClicks.current >= 5) {
          setView('admin');
          adminClicks.current = 0;
        }
        // 리셋 타이머 추가 (빨리 누르지 않으면 초기화)
        setTimeout(() => { adminClicks.current = 0; }, 3000);

      // ── 시작 화면 ──
      if (view === 'start') {
        return (

              <button onClick={() => setView('age')}
                className="tap w-full py-4 rounded-2xl bg-apple-blue text-white font-bold shadow-2xl flex items-center justify-center gap-2">
                진단 시작하기
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7" /></svg>
              </button>
            </div>
          </div>

      }

      // ── 연령 선택 화면 ──
      if (view === 'age') {
        return (

              <h2 className="text-2xl font-bold mb-2 text-center">연령대를 선택해주세요</h2>
              <p className="text-sm text-apple-gray mb-8 text-center px-4">선택하신 연령대에 맞춤화된 전문 솔루션이 처방됩니다.</p>
              <div className="grid grid-cols-1 gap-3">
                {ageGroups.map(g => (
                  <button key={g.id} onClick={() => { setAge(g.id); setView('quiz'); }}
                    className="tap bg-apple-surface border border-apple-border p-4 rounded-2xl flex items-center gap-4 hover:border-apple-blue/50 transition-all">
                    <span className="text-3xl">{g.icon}</span>
                    <div className="text-left">
                      <p className="font-bold text-base">{g.label}</p>
                      <p className="text-[11px] text-apple-gray">{g.desc}</p>

                  </button>
                ))}

              <button onClick={() => setView('start')} className="w-full text-apple-gray text-xs mt-8 opacity-50 underline">돌아가기</button>
            </div>

        );

      // ── 관리자 화면 ──
      if (view === 'admin') {
        const statsStr = localStorage.getItem('stress_stats');
        const defaultStats = { total: 0, levels: {}, ages: {}, daily: {}, contacts: [] };
        const stats = statsStr ? { ...defaultStats, ...JSON.parse(statsStr) } : defaultStats;
        const levelMap = { 'very_low': '최상 안정', 'low': '안정 단계', 'moderate': '주의 단계', 'high': '위험 단계', 'high_danger': '고위험군' };

        return (
          <div className="min-h-[100dvh] w-full bg-apple-black flex flex-col px-6 py-12 pb-32">
            <div className="fade-up w-full max-w-sm glass border border-white/10 rounded-[40px] p-8 my-auto">
              <div className="flex items-center justify-between mb-6">
                <h1 className="text-xl font-bold flex items-center gap-2">
                  <span className="p-2 bg-white/10 rounded-lg">📊</span> 관리 통계

      if (view === 'result') {

            const link = document.createElement('a');

        return (

              <p className="text-sm opacity-90 mb-6 leading-relaxed bg-black/20 p-4 rounded-2xl border border-white/5">{rx.desc}</p>
              <div className="space-y-3 mb-8">
                <p className="text-[10px] font-bold text-current/60 uppercase tracking-widest px-1">{ageGroups.find(g => g.id === age).label} 전용 처방</p>
                {rx.rx.map((item, i) => (
                  <div key={i} className="flex items-start gap-3 text-sm bg-white/5 p-3 rounded-xl border border-white/5">
                    <span className="text-apple-blue font-bold">0{i + 1}</span>
                    <span className="font-medium">{item}</span>
                  </div>
                ))}
              </div>
              {isAdminNote && !contactSubmitted && (
                <div className="mb-6 bg-black/40 p-5 rounded-2xl border border-apple-red/30 no-capture">
                  <p className="text-xs text-white/80 mb-3 text-center leading-relaxed">
                    전문가의 도움이 필요하신가요?<br />연락처를 남겨주시면 센터 전문가가 연락을 드립니다.
                  </p>
                  <label className="flex items-start gap-2 text-left mb-4 opacity-80 cursor-pointer tap">
                    <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)} className="mt-0.5 accent-apple-red" />
                    <span className="text-[10px] text-white/70 leading-tight">

                      <span className="opacity-50">(목적: 상담 연계 / 항목: 연락처 / 보유: 상담 완료 후 파기)</span>
                    </span>
                  </label>
                  <div className="grid grid-cols-2 gap-2 mb-2">
                    <input
                      type="text"
                      placeholder="성함 (예: 홍길동)"
                      value={contactName}
                      onChange={e => setContactName(e.target.value)}
                      className="bg-white/10 text-white placeholder-white/30 px-4 py-3 rounded-xl text-sm outline-none border border-white/10 focus:border-apple-red/50 transition-colors"
                    />
                    <input

                      className="bg-white/10 text-white placeholder-white/30 px-4 py-3 rounded-xl text-sm outline-none border border-white/10 focus:border-apple-red/50 transition-colors"
                    />
                  </div>
                  <div className="flex gap-2">

              {isAdminNote && contactSubmitted && (

              )}

              <div className="no-capture flex gap-2 w-full mb-3">
                <button onClick={handleSaveImage} className="tap flex-1 py-4 rounded-2xl bg-white/20 border border-white/20 text-xs font-bold text-white shadow-lg">결과 저장하기</button>
                <button onClick={reset} className="tap flex-1 py-4 rounded-2xl bg-white/10 border border-white/10 text-xs font-bold text-white/80">처음으로</button>
              </div>

              <a href="http://www.imhc.co.kr/selfcheck/adult.php" target="_blank" rel="noopener noreferrer"
                className="no-capture tap flex items-center justify-center gap-2 w-full py-4 mb-8 rounded-2xl bg-apple-blue/20 border border-apple-blue/30 text-apple-blue text-xs font-bold shadow-lg transition-all hover:bg-apple-blue/30">
                <span>추가 심리검사 해보기 (우울/불안 등)</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </a>

              <div className="mt-6 border-t border-white/10 pt-6">
                <p className="text-center text-xs font-bold text-white/80 mb-3">위기 대처 및 상담 안내</p>
                <div className="space-y-2 text-[11px] text-white/60 bg-black/30 p-4 rounded-2xl">
                  {isAdminNote && (
                    <>
                      <div className="flex justify-between items-center"><span className="text-apple-red font-medium">정신건강위기상담전화</span><a href="tel:1577-0199" className="font-bold underline tap text-white">1577-0199</a></div>
                      <div className="flex justify-between items-center"><span className="text-apple-red font-medium">자살예방상담전화</span><a href="tel:109" className="font-bold underline tap text-white">109</a></div>
                    </>
                  )}
                  {age === 'senior' && (
                    <div className="flex justify-between items-center"><span className="text-apple-blue font-medium">노인전화상담</span><a href="tel:1588-7128" className="font-bold underline tap text-white">1588-7128</a></div>
                  )}
                  <div className="flex justify-between items-center"><span className="font-medium">이천시정신건강복지센터</span><a href="tel:031-637-2330" className="font-bold underline tap text-white">031-637-2330</a></div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── 문항 화면 ──
      const q = questions[step];
      return (
        <div className="min-h-[100dvh] w-full bg-apple-black flex flex-col px-4 pt-12 pb-32">
          <div className="w-full max-w-xl mx-auto flex flex-col">
            <div className="text-center mb-10 shrink-0">
              <div className="relative inline-block mb-2"><span className="text-4xl">🔬</span><div className="absolute -top-1 -right-1 w-3 h-3 bg-apple-blue rounded-full animate-ping"></div></div>
              <h1 className="text-lg font-bold tracking-tight">심리 데이터 분석 중</h1>
              <div className="mt-4 px-10">
                <div className="h-[6px] bg-apple-surface rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-apple-blue to-apple-purple rounded-full transition-all duration-700 ease-out shadow-[0_0_12px_rgba(10,132,255,0.6)]"
                    style={{ width: `${((step + 1) / total) * 100}%` }} />
                </div>
              </div>
              <p className="text-[10px] text-apple-gray font-bold uppercase tracking-[0.2em] mt-3">문항 {step + 1} / {total}</p>
            </div>

            <div key={step} className="fade-up flex flex-col mb-8">
              <div className="bg-apple-surface/40 border border-apple-border rounded-[48px] overflow-hidden glass shadow-2xl relative">
                <div className="relative flex items-center justify-center py-10">
                  <div className={`${q.anim} relative z-10`}>
                    <img src={q.img} alt={q.imgAlt} className="w-28 h-28 object-contain drop-shadow-[0_20px_40px_rgba(0,0,0,0.5)]" onError={e => { e.target.style.display = 'none'; e.target.nextSibling.classList.remove('hidden'); }} />
                    <span className="text-8xl hidden">{q.icon}</span>
                  </div>
                  <div className="absolute top-6 left-6 flex items-center gap-2"><span className="text-[10px] font-black text-apple-blue bg-apple-blue/10 px-3 py-1 rounded-full border border-apple-blue/20">QUESTION {q.id}</span></div>
                </div>
                <div className="px-8 pb-4 text-center">
                  <h3 className="text-xl font-bold leading-suuug mb-3">{q.text}</h3>
                  <p className="text-sm text-apple-gray leading-relaxed max-w-[280px] mx-auto opacity-70 italic">"{q.hint}"</p>
                </div>
                <div className="px-5 pb-8 pt-2">
                  <div className="flex flex-col gap-3">
                    {options.map(opt => (
                      <button key={opt.v} onClick={() => handlePick(q.id, opt.v)}
                        className={"tap flex items-center justify-between p-4 rounded-xl border transition-all " + (answers[q.id] === opt.v ? "bg-apple-blue border-apple-blue text-white shadow-[0_8px_16px_rgba(10,132,255,0.4)] scale-[1.02] z-10" : "bg-white/5 border-white/5 text-apple-gray hover:bg-white/10")}>
                        <div className="flex items-center gap-4">
                          <span className="text-2xl">{opt.face}</span>
                          <span className="text-[13px] font-semibold tracking-tight text-left leading-snug">{opt.label.replace('\n', ' ')}</span>
                        </div>
                        {opt.desc && <span className="text-[11px] opacity-60 font-medium">{opt.desc}</span>}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-auto mb-6 shrink-0 flex items-center justify-between px-2">
              <button onClick={() => step > 0 && setStep(s => s - 1)} disabled={step === 0} className={`flex items-center gap-2 text-sm font-bold transition-all ${step === 0 ? 'opacity-0 pointer-events-none' : 'text-apple-gray hover:text-white'}`}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                이전 문항
              </button>
              {isLast && answers[q.id] !== undefined && (<button onClick={calculate} className="fade-up tap bg-apple-green text-black px-8 py-4 rounded-full font-black text-sm shadow-xl shadow-apple-green/30">진단 결과 확인하기</button>)}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
