                          </div>
                          <div className="flex justify-between items-center">
                            <span className="text-xs font-bold text-apple-blue bg-apple-blue/5 px-2 py-0.5 rounded-lg">{c.phone}</span>
                            <span className={`text-[11px] font-black ${c.level.includes('high') ? 'text-apple-red' : 'text-apple-orange'}`}>{levelMap[c.level]}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              <button onClick={() => setView('start')} className="tap w-full mt-10 py-4 bg-apple-gray text-white rounded-[24px] font-black text-base shadow-lg shadow-apple-gray/10 mb-2">닫기</button>
            </div>
          </div>
        );
      }

      // ── 결과 화면 ──
      if (view === 'result') {
        const rx = getPrescription(result.level, age);
        const isAdminNote = (result.level === 'high' || result.level === 'high_danger');

        const handleSaveImage = () => {
          const target = document.getElementById('capture-area');
          if (!target || !window.html2canvas) return;
          const hideEls = target.querySelectorAll('.no-capture');
          hideEls.forEach(el => el.style.display = 'none');
          window.html2canvas(target, { backgroundColor: '#1C1C1E', scale: 2 }).then(canvas => {
            hideEls.forEach(el => el.style.display = '');
            const link = document.createElement('a');
            link.download = `마음건강진단_결과_${result.score}점.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          });
        };

        return (
          <div className="min-h-[100dvh] w-full px-6 py-16 pb-32 block">
            <div id="capture-area" className={`mx-auto fade-up w-full max-w-sm border-2 rounded-[60px] p-10 glass shadow-2xl relative overflow-hidden ${rx.style}`}>
              <div className="flex items-center justify-between mb-8">
                <span className="text-6xl">{rx.emoji}</span>
                <span className="text-[11px] bg-white border-2 border-current/20 px-4 py-1.5 rounded-full font-black tracking-tight uppercase opacity-80">{rx.badge}</span>
              </div>
              <h2 className="text-3xl font-black mb-3 leading-tight text-apple-gray">{rx.title}</h2>
              <div className={`text-7xl font-black mb-6 tracking-tight ${rx.color}`}>{result.score}<span className="text-xl font-black opacity-30 ml-2">점</span></div>
              <p className="text-[15px] font-semibold opacity-90 mb-10 leading-relaxed bg-white/40 p-6 rounded-[32px] border border-apple-border shadow-sm text-apple-gray/80">{rx.desc}</p>
              
              <div className="space-y-4 mb-10">
                <p className="text-xs font-black text-current/40 uppercase tracking-[0.2em] px-2">{ageGroups.find(g => g.id === age).label} 맞춤 처방전</p>
                {rx.rx.map((item, i) => (
                  <div key={i} className="flex items-start gap-4 text-[14px] bg-white p-5 rounded-[24px] border border-apple-border shadow-sm">
                    <span className="text-apple-blue font-black text-lg">0{i + 1}</span>
                    <span className="font-bold text-apple-gray/90 leading-snug">{item}</span>
                  </div>
                ))}
              </div>
              {isAdminNote && !contactSubmitted && (
                <div className="mb-8 bg-white/60 p-6 rounded-[32px] border-2 border-apple-red/10 no-capture">
                  <p className="text-sm font-black text-apple-gray mb-4 text-center leading-relaxed">
                    전문 상담사가 당신을 기다리고 있어요.<br />연락처를 남겨주시면 곧 연락드릴게요!
                  </p>
                  <label className="flex items-start gap-3 text-left mb-6 opacity-80 cursor-pointer tap">
                    <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)} className="mt-1 accent-apple-red w-4 h-4" />
                    <span className="text-[14px] text-apple-gray/70 font-semibold leading-tight">
                      개인정보 수집 및 이용 동의 (필수)<br />
                      <span className="opacity-50 text-[12px] font-medium">(목적: 상담 연계 / 항목: 성함, 나이, 연락처 / 보유기간: 상담 완료 후 즉시 파기)</span>
                    </span>
                  </label>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <input
                      type="text"
                      placeholder="성함"
                      value={contactName}
                      onChange={e => setContactName(e.target.value)}
                      className="bg-white text-apple-gray placeholder-apple-gray/30 px-5 py-4 rounded-2xl text-sm outline-none border-2 border-apple-border focus:border-apple-blue transition-all font-bold shadow-sm"
                    />
                    <input
                      type="number"
                      placeholder="나이"
                      value={contactAge}
                      onChange={e => setContactAge(e.target.value)}
                      className="bg-white text-apple-gray placeholder-apple-gray/30 px-5 py-4 rounded-2xl text-sm outline-none border-2 border-apple-border focus:border-apple-blue transition-all font-bold shadow-sm"
                    />
                  </div>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <input
                      type="tel"
                      placeholder="연락처 (010-0000-0000)"
                      value={contact}
                      onChange={e => setContact(e.target.value)}
                      className="flex-1 bg-white text-apple-gray placeholder-apple-gray/30 px-5 py-4 rounded-2xl text-sm outline-none border-2 border-apple-border focus:border-apple-blue transition-all font-bold shadow-sm"
                    />
                    <button onClick={handleContactSubmit} className="bg-apple-red text-white font-black px-6 py-4 rounded-2xl text-sm whitespace-nowrap tap shadow-lg shadow-apple-red/20">
                      신청하기
                    </button>
                  </div>
                </div>
              )}
              {isAdminNote && contactSubmitted && (
                <div className="mb-8 bg-apple-green/10 p-6 rounded-[32px] border-2 border-apple-green/20 text-center no-capture animate-bounce-short">
                  <p className="text-apple-green text-lg font-black flex items-center justify-center gap-3">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    접수 완료!
                  </p>
                  <p className="text-xs text-apple-green/70 mt-2 font-bold">마음 건강 전문가가 곧 당신을 찾아갑니다.</p>
                </div>
              )}

              {isAdminNote && (
                <div className="mb-10 bg-apple-red/5 border-2 border-apple-red/10 rounded-[48px] p-8 text-center no-capture">
                  <p className="text-xs font-black text-apple-red/40 uppercase tracking-[0.2em] mb-3">Emergency Hub</p>
                  <p className="text-2xl font-black text-apple-red mb-2">도움이 필요하신가요?</p>
                  <p className="text-sm text-apple-red/60 font-semibold mb-8 italic">“망설이지 말고 언제든 상담해 주세요”</p>
                  
                  <div className="bg-white rounded-[32px] p-5 shadow-sm border border-apple-red/10 space-y-4">
                    <div className="flex justify-between items-center bg-apple-red/5 px-5 py-4 rounded-2xl">
                      <span className="text-apple-red font-black text-sm">정신건강위기상담</span>
                      <span className="text-apple-gray font-black text-xl tracking-tight">1577-0199</span>
                    </div>
                    <div className="flex justify-between items-center bg-apple-red/5 px-5 py-4 rounded-2xl">
                      <span className="text-apple-red font-black text-sm">자살예방상담</span>
                      <span className="text-apple-gray font-black text-xl tracking-tight">109</span>
                    </div>
                    {age === 'senior' && (
                      <div className="flex justify-between items-center bg-apple-blue/5 px-5 py-4 rounded-2xl">
                        <span className="text-apple-blue font-black text-sm">노인전화상담</span>
                        <span className="text-apple-gray font-black text-xl tracking-tight">1588-7128</span>
                      </div>
                    )}
                    <div className="pt-2 border-t border-apple-border/50">
                      <div className="flex justify-between items-center px-4 py-3">
                        <div className="text-left">
                          <p className="text-apple-gray font-black text-sm leading-tight">이천시정신건강</p>
                          <p className="text-apple-gray font-black text-sm leading-tight">복지센터</p>
                        </div>
                        <div className="text-right">
                          <p className="text-apple-gray font-black text-xl tracking-tight">031-637-2330</p>
                          <p className="text-[10px] text-apple-gray/40 font-bold mt-0.5">평일 09:00 - 18:00</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <div className="no-capture flex gap-3 w-full mb-4">
                <button onClick={handleSaveImage} className="tap flex-1 py-4 rounded-[24px] bg-apple-blue text-white text-[13px] font-black shadow-lg shadow-apple-blue/10">결과 저장하기</button>
                <button onClick={reset} className="tap flex-1 py-4 rounded-[24px] bg-white border border-apple-border text-[13px] font-black text-apple-gray shadow-cute">다시 하기</button>
              </div>

              <a href="http://www.imhc.co.kr/selfcheck/adult.php" target="_blank" rel="noopener noreferrer"
                className="no-capture tap flex items-center justify-center gap-3 w-full py-4 mb-10 rounded-[24px] bg-apple-blue/5 border-2 border-apple-blue/10 text-apple-blue text-[13px] font-black transition-all hover:bg-apple-blue/10">
                <span>추가 검사 (우울/불안)</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </a>


            </div>
          </div>
        );
      }

      // ── 문항 화면 ──
      const q = questions[step];
      return (
        <div className="min-h-[100dvh] w-full flex flex-col px-6 pt-16 pb-32">
          <div className="w-full max-w-xl mx-auto flex flex-col">
            <div className="text-center mb-12 shrink-0">
              <div className="relative inline-block mb-3"><span className="text-5xl">🔭</span><div className="absolute -top-1 -right-1 w-4 h-4 bg-apple-blue rounded-full animate-ping"></div></div>
              <h1 className="text-xl font-black tracking-tight text-apple-gray">심리 주파수 분석 중...</h1>
              <div className="mt-6 px-10">
                <div className="h-[10px] bg-white border border-apple-border rounded-full overflow-hidden shadow-sm">
                  <div className="h-full bg-gradient-to-r from-apple-blue to-apple-purple rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_rgba(125,185,182,0.4)]"
                    style={{ width: `${((step + 1) / total) * 100}%` }} />
                </div>
              </div>
              <p className="text-[11px] text-apple-gray font-black uppercase tracking-[0.2em] mt-4 opacity-40">STEP {step + 1} / {total}</p>
            </div>

            <div key={step} className="fade-up flex flex-col mb-10">
              <div className="bg-white border-2 border-apple-border rounded-[48px] overflow-hidden shadow-cute relative">
                <div className="relative flex items-center justify-center py-12 bg-apple-blue/5">
                  <div className={`${q.anim} relative z-10`}>
                    <img src={q.img} alt={q.imgAlt} className="w-32 h-32 object-contain drop-shadow-[0_15px_30px_rgba(0,0,0,0.1)]" onError={e => { e.target.style.display = 'none'; e.target.nextSibling.classList.remove('hidden'); }} />
                    <span className="text-8xl hidden">{q.icon}</span>
                  </div>
                  <div className="absolute top-8 left-8 flex items-center gap-2 shadow-sm"><span className="text-[11px] font-black text-apple-blue bg-white px-4 py-1.5 rounded-full border border-apple-blue/20">QUESTION {q.id}</span></div>
                </div>
                <div className="px-10 pb-6 pt-4 text-center">
                  <h3 className="text-2xl font-black leading-snug mb-4 text-apple-gray">{q.text}</h3>
                  <p className="text-sm text-apple-gray/50 leading-relaxed max-w-[300px] mx-auto opacity-70 font-semibold italic">"{q.hint}"</p>
                </div>
                <div className="px-6 pb-10 pt-2">
                  <div className="flex flex-col gap-4">
                    {options.map(opt => (
                      <button key={opt.v} onClick={() => handlePick(q.id, opt.v)}
                        className={"tap flex items-center justify-between p-5 rounded-[24px] border-2 transition-all " + (answers[q.id] === opt.v ? "bg-apple-blue border-apple-blue text-white shadow-lg shadow-apple-blue/20 scale-[1.02] z-10" : "bg-white border-apple-border text-apple-gray hover:border-apple-blue font-bold")}>
                        <div className="flex items-center gap-5">
                          <span className="text-3xl">{opt.face}</span>
                          <span className="text-sm font-black tracking-tight text-left leading-tight">{opt.label.replace('\n', ' ')}</span>
                        </div>
                        {opt.desc && <span className="text-[11px] opacity-60 font-black">{opt.desc}</span>}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-auto mb-6 shrink-0 flex items-center justify-between px-4">
              <button onClick={() => step > 0 && setStep(s => s - 1)} disabled={step === 0} className={`flex items-center gap-3 text-sm font-black transition-all ${step === 0 ? 'opacity-0 pointer-events-none' : 'text-apple-gray/40 hover:text-apple-blue'}`}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                이전 문항
              </button>
              {isLast && answers[q.id] !== undefined && (<button onClick={calculate} className="fade-up tap bg-apple-green text-apple-gray px-12 py-5 rounded-[32px] font-black text-base shadow-xl shadow-apple-green/20">진단 결과 확인하기</button>)}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
